openapi: 3.0.3
info:
  title: Log RCA Copilot Self-hosted API
  version: 1.0.0-mvp
  description: |
    MVP API contract for self-hosted BYOM architecture.
    Scope: Loki integration, incident analysis, OpenAI/Gemini OAuth+API key,
    Slack/Email alerts, and operational endpoints.
servers:
  - url: http://localhost:8080
    description: Local self-hosted server
tags:
  - name: System
  - name: Bootstrap
  - name: Tokens
  - name: Projects
  - name: Connectors
  - name: LLM Accounts
  - name: Policies
  - name: Ingest
  - name: Incidents
  - name: Alerts
  - name: Audit

paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness check
      operationId: healthz
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /readyz:
    get:
      tags: [System]
      summary: Readiness check
      operationId: readyz
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /v1/system/info:
    get:
      tags: [System]
      summary: Runtime info (storage mode, version, feature flags)
      operationId: getSystemInfo
      security:
        - bearerAuth: []
      responses:
        '200':
          description: System info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfoResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/bootstrap/status:
    get:
      tags: [Bootstrap]
      summary: Check if initial bootstrap is completed
      operationId: getBootstrapStatus
      responses:
        '200':
          description: Bootstrap state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapStatusResponse'

  /v1/bootstrap/initialize:
    post:
      tags: [Bootstrap]
      summary: Initialize first project and initial operator/ingest tokens
      operationId: initializeBootstrap
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootstrapInitializeRequest'
      responses:
        '201':
          description: Bootstrap completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapInitializeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/tokens:
    get:
      tags: [Tokens]
      summary: List issued tokens with lifecycle metadata
      operationId: listTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Tokens]
      summary: Issue a new token
      operationId: issueToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueTokenRequest'
      responses:
        '201':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/tokens/{token_id}/rotate:
    post:
      tags: [Tokens]
      summary: Rotate an active token and return a new token value
      operationId: rotateToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      responses:
        '200':
          description: Rotated token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/tokens/{token_id}/revoke:
    post:
      tags: [Tokens]
      summary: Revoke a token
      operationId: revokeToken
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TokenId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeTokenRequest'
      responses:
        '200':
          description: Revoked token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenMetadataResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/projects:
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/projects/{project_id}/connectors/loki:
    post:
      tags: [Connectors]
      summary: Create or update Loki pull connector
      operationId: upsertLokiConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LokiConnectorRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/projects/{project_id}/connectors/loki/test:
    post:
      tags: [Connectors]
      summary: Test Loki connector credentials/query
      operationId: testLokiConnector
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LokiTestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

  /v1/projects/{project_id}/llm-accounts/api-key:
    post:
      tags: [LLM Accounts]
      summary: Add/update API key based LLM account
      operationId: upsertApiKeyLlmAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmApiKeyAccountRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmAccountResponse'
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmAccountResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/projects/{project_id}/llm-oauth/{provider}/start:
    post:
      tags: [LLM Accounts]
      summary: Start OAuth flow for provider (openai, gemini)
      operationId: startLlmOAuth
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/OAuthProvider'
      responses:
        '200':
          description: OAuth URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/projects/{project_id}/llm-oauth/{provider}/callback:
    get:
      tags: [LLM Accounts]
      summary: OAuth callback endpoint
      operationId: callbackLlmOAuth
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/OAuthProvider'
        - name: code
          in: query
          required: false
          description: Authorization code (required when `error` is absent; ignored when `error` is present)
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          required: false
          description: Provider callback error code (takes precedence over `code`)
          schema:
            type: string
        - name: error_description
          in: query
          required: false
          description: Provider callback error detail
          schema:
            type: string
      responses:
        '200':
          description: OAuth account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthCallbackResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/projects/{project_id}/llm-accounts:
    get:
      tags: [LLM Accounts]
      summary: List connected LLM accounts
      operationId: listLlmAccounts
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: LLM account list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmAccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/projects/{project_id}/llm-accounts/{account_id}:
    delete:
      tags: [LLM Accounts]
      summary: Remove linked LLM account
      operationId: deleteLlmAccount
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - $ref: '#/components/parameters/AccountId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/projects/{project_id}/policies/export:
    put:
      tags: [Policies]
      summary: Update export policy
      operationId: updateExportPolicy
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportPolicyRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/projects/{project_id}/policies/redaction:
    put:
      tags: [Policies]
      summary: Update masking/redaction rules
      operationId: updateRedactionPolicy
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedactionPolicyRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedactionPolicyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/ingest/events:
    post:
      tags: [Ingest]
      summary: Ingest canonical events (push path)
      operationId: ingestEvents
      security:
        - ingestToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestEventsRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /v1/ingest/otlp/logs:
    post:
      tags: [Ingest]
      summary: Ingest OTLP logs payload (reserved)
      description: |
        Reserved endpoint for post-MVP expansion.
        In MVP default configuration, this endpoint may be disabled (501 Not Implemented).
      operationId: ingestOtlpLogs
      security:
        - ingestToken: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/x-protobuf:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /v1/projects/{project_id}/incidents:
    get:
      tags: [Incidents]
      summary: List incidents
      operationId: listIncidents
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, investigating, resolved, ignored]
        - name: service
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Incident list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/incidents/{incident_id}:
    get:
      tags: [Incidents]
      summary: Get incident detail
      operationId: getIncident
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Incident detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/incidents/{incident_id}/reanalyze:
    post:
      tags: [Incidents]
      summary: Trigger reanalysis
      operationId: reanalyzeIncident
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReanalyzeRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReanalyzeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/projects/{project_id}/alerts/slack:
    post:
      tags: [Alerts]
      summary: Configure Slack alert channel
      operationId: configureSlack
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlackAlertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannelResponse'
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/projects/{project_id}/alerts/email:
    post:
      tags: [Alerts]
      summary: Configure Email alert channel
      operationId: configureEmail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailAlertRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannelResponse'
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertChannelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /v1/projects/{project_id}/audit-logs:
    get:
      tags: [Audit]
      summary: List project audit logs
      operationId: listAuditLogs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
        - name: action
          in: query
          schema:
            type: string
        - name: actor
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ingestToken:
      type: http
      scheme: bearer
      bearerFormat: IngestToken

  parameters:
    ProjectId:
      name: project_id
      in: path
      required: true
      schema:
        type: string
    IncidentId:
      name: incident_id
      in: path
      required: true
      schema:
        type: string
    AccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
    TokenId:
      name: token_id
      in: path
      required: true
      schema:
        type: string
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum: [openai, gemini]
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authorization failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limited
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadGateway:
      description: Upstream failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Feature not enabled in current deployment
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ApiMeta:
      type: object
      properties:
        request_id:
          type: string
        next_cursor:
          type: string
          nullable: true
      additionalProperties: false

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                additionalProperties: true
          required: [code, message]
      required: [error]

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
      required: [status]

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
      required: [status, checks]

    SystemInfoResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            version:
              type: string
            storage_mode:
              type: string
              enum: [sqlite, postgres, mysql]
            queue_mode:
              type: string
              enum: [in_process, redis]
            features:
              type: object
              additionalProperties:
                type: boolean
          required: [version, storage_mode, queue_mode, features]
      required: [data]

    BootstrapStatusResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            bootstrapped:
              type: boolean
            initialized_at:
              type: string
              format: date-time
              nullable: true
          required: [bootstrapped]
      required: [data]

    BootstrapInitializeRequest:
      type: object
      properties:
        project_name:
          type: string
          minLength: 1
          maxLength: 100
        environment:
          type: string
          enum: [prod, staging, dev]
        operator_token_name:
          type: string
          maxLength: 80
          nullable: true
        ingest_token_name:
          type: string
          maxLength: 80
          nullable: true
      required: [project_name, environment]

    TokenRecord:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [operator, api, ingest]
        status:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        rotated_at:
